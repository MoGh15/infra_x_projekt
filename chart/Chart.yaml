apiVersion: v2
name: praxis-form
description: Helm chart for Praxis Form application (frontend, backend, MongoDB)
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: mongodb
    version: "14.13.0"
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  - name: grafana
    version: "12.7.1"
    repository: https://grafana-community.github.io/helm-charts/
    condition: grafana.enabled

