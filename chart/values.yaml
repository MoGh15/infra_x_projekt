# Default values for praxis-form

global:
  domain: kubernetes.praxis-form.de

ingress:
  enabled: true

praxisHost: kubernetes.praxis-form.de

# --- Backend ---
backend:
  replicaCount: 2
  image:
    repository: ghcr.io/mogh15/infra_x_projekt/backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  env:
    MONGODB_URI: mongodb://praxis-form-mongodb:27017/praxis
    JWT_EXP_MINUTES: "120"
  secrets:
    JWT_SECRET: CHANGE_ME_very_long_secret_at_least_32_chars
    ADMIN_DEFAULT_PASSWORD: CHANGE_ME
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: praxis-form-letsencrypt
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - host: kubernetes.praxis-form.de
        paths:
          - path: /api
            pathType: Prefix
    tls:
      - secretName: praxis-form-backend-tls
        hosts:
          - kubernetes.praxis-form.de

# --- Frontend ---
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/mogh15/infra_x_projekt/frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  env:
    API_URL: https://kubernetes.praxis-form.de
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: praxis-form-letsencrypt
    hosts:
      - host: kubernetes.praxis-form.de
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: praxis-form-frontend-tls
        hosts:
          - kubernetes.praxis-form.de

# --- MongoDB (Bitnami subchart) ---
mongodb:
  image:
    tag: latest
  enabled: true
  auth:
    enabled: false
  persistence:
    enabled: true
    size: 8Gi

# --- Cert-Manager (separat installiert) ---
certManager:
  # E-Mail für Let's Encrypt Registrierung
  email: mohammadghannam892@gmail.com
  # Prod: https://acme-v02.api.letsencrypt.org/directory
  # Staging: https://acme-staging-v02.api.letsencrypt.org/directory
  acmeServer: https://acme-staging-v02.api.letsencrypt.org/directory

grafana:
  enabled: true
  adminUser: admin
  adminPassword: CHANGE_ME_very_long_password_at_least_32_chars
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    hosts:
      - grafana-mohammad.praxis-form.de
    tls:
      - secretName: praxis-form-grafana-mohammad-tls
        hosts:
          - grafana-mohammad.praxis-form.de
