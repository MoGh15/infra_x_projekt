version: "3.9"

services:
  mongodb:
    image: mongo:7.0.28
    container_name: praxis-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: praxis
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/praxis", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./praxis
      dockerfile: Dockerfile
    container_name: praxis-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/praxis
      JWT_SECRET: CHANGE_ME_very_long_secret_at_least_32_chars
      JWT_EXP_MINUTES: "120"
      ADMIN_DEFAULT_PASSWORD: yIG8wsTGE9wLcAdipSFO
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./praxis-frontend
      dockerfile: Dockerfile
    container_name: praxis-frontend
    ports:
      - "4200:80"
    environment:
      API_URL: "https://dev.praxis-form.de"
    depends_on:
      - backend

volumes:
  mongo_data:
