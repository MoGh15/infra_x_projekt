# GitLab CI/CD Pipeline für PraxisForm
# Backend: Spring Boot (Java 17/21) mit Maven
# Frontend: Angular mit npm

stages:
  - test
  - build
  - docker
  - deploy

variables:
  # Maven
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  # Docker
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Image Namen (anpassen an eure Registry)
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend

# Cache für schnellere Builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/
    - praxis-frontend/node_modules/

# ============================================
# BACKEND JOBS
# ============================================

backend:test:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  services:
    - name: mongo:7.0
      alias: mongodb
  variables:
    MONGODB_URI: mongodb://mongodb:27017/praxis-test
    JWT_SECRET: test-secret-key-at-least-32-characters-long
    JWT_EXP_MINUTES: "60"
    SPRING_PROFILES_ACTIVE: test
  script:
    - cd praxis
    - chmod +x ./mvnw
    - ./mvnw verify -B
  artifacts:
    when: always
    reports:
      junit: praxis/target/surefire-reports/*.xml
    paths:
      - praxis/target/site/jacoco/
    expire_in: 1 week
  rules:
    - changes:
        - praxis/**/*
        - .gitlab-ci.yml

backend:build:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd praxis
    - chmod +x ./mvnw
    - ./mvnw package -DskipTests -B
  artifacts:
    paths:
      - praxis/target/*.jar
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  needs:
    - job: backend:test
      optional: true

# ============================================
# FRONTEND JOBS
# ============================================

frontend:lint:
  stage: test
  image: node:22-alpine
  script:
    - cd praxis-frontend
    - npm ci --prefer-offline
    - npx ng lint || echo "Linting nicht konfiguriert, wird übersprungen"
  allow_failure: true
  rules:
    - changes:
        - praxis-frontend/**/*
        - .gitlab-ci.yml

frontend:build:
  stage: build
  image: node:22-alpine
  script:
    - cd praxis-frontend
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    paths:
      - praxis-frontend/dist/
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  needs:
    - job: frontend:lint
      optional: true

# ============================================
# DOCKER BUILD JOBS
# ============================================

docker:backend:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA -t $BACKEND_IMAGE:latest ./praxis
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $BACKEND_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - job: backend:build
      optional: true

docker:frontend:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA -t $FRONTEND_IMAGE:latest ./praxis-frontend
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $FRONTEND_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - job: frontend:build
      optional: true

# ============================================
# DEPLOY JOB
# ============================================

# Deployment auf dev.praxis-form.de Server
deploy:
  stage: deploy
  image: alpine:latest
  variables:
    SERVER_HOST: "87.106.50.149"
    SERVER_USER: "root"
    DEPLOY_PATH: "/opt/praxis-form"
  before_script:
    - apk add --no-cache openssh-client sshpass
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "
        set -e
        cd $DEPLOY_PATH
        
        # Docker Registry Login
        echo '$CI_REGISTRY_PASSWORD' | docker login -u '$CI_REGISTRY_USER' --password-stdin $CI_REGISTRY
        
        # CI_REGISTRY_IMAGE zur .env hinzufügen/aktualisieren
        if grep -q 'CI_REGISTRY_IMAGE' .env 2>/dev/null; then
          sed -i 's|CI_REGISTRY_IMAGE=.*|CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE|' .env
        else
          echo 'CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE' >> .env
        fi
        
        # Docker Compose Command ermitteln (V2 bevorzugt, V1 ist inkompatibel mit neueren Images)
        if docker compose version &> /dev/null; then
          DC='docker compose'
        elif command -v docker-compose &> /dev/null; then
          DC='docker-compose'
        else
          echo 'Kein docker compose gefunden!' && exit 1
        fi
        
        # Alte Container stoppen und entfernen
        \$DC down --remove-orphans
        
        # Images pullen
        \$DC pull
        
        # Container neu starten
        \$DC up -d --force-recreate --remove-orphans
        
        # Alte Images aufräumen
        docker image prune -f
        
        echo 'Deployment abgeschlossen!'
      "
  environment:
    name: production
    url: https://dev.praxis-form.de
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: manual
  needs:
    - job: docker:backend
      optional: true
    - job: docker:frontend
      optional: true

